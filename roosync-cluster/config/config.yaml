# Hermes Agent — Deployment config for po-2026 (z.ai)
# DO NOT edit ~/.hermes/config.yaml directly — edit THIS file and re-deploy.
# After editing, copy to volume and restart: see roosync-cluster/scripts/hermes-start.ps1

model:
  default: "glm-5-turbo"
  provider: "zai"

compression:
  enabled: true

auxiliary:
  compression:
    provider: "zai"
    model: "glm-4.5-air"

terminal:
  backend: "local"

display:
  personality: "default"

stt:
  enabled: true
  provider: "openai"
  openai:
    model: "whisper-1"
    base_url: "https://whisper-api.myia.io/v1"
    api_key: "${WHISPER_BEARER_TOKEN}"

# MCP servers — LAN direct (bypass IIS ARR pool issues on po-2023)
# Auth token from MCP_AUTH_TOKEN in .env.secrets
mcp_servers:
  roo-state-manager:
    command: npx
    args:
      - -y
      - mcp-remote
      - http://192.168.0.47:9090/roo-state-manager/mcp
      - --allow-http
      - --header
      - "Authorization:Bearer ${MCP_AUTH_TOKEN}"
  sk-agent:
    command: npx
    args:
      - -y
      - mcp-remote
      - http://192.168.0.47:9090/sk-agent/mcp
      - --allow-http
      - --header
      - "Authorization:Bearer ${MCP_AUTH_TOKEN}"
  searxng:
    command: npx
    args:
      - -y
      - mcp-remote
      - http://192.168.0.47:9090/searxng/mcp
      - --allow-http
      - --header
      - "Authorization:Bearer ${MCP_AUTH_TOKEN}"
